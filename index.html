<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar Creator</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --panel: #ffffff;
        --line: #d4dde8;
        --ink: #1a2433;
        --accent: #0f7b6c;
        --subtle: #6b7a90;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #eef5ff 0%, var(--bg) 40%, #ecf2fb 100%);
        color: var(--ink);
      }

      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .calendar-wrap {
        width: min(1080px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 20px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 16px;
      }

      .title {
        margin: 0;
        font-size: 1.4rem;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--subtle);
        font-size: 0.95rem;
      }

      .selector {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }

      .selector label {
        font-size: 0.85rem;
        color: var(--subtle);
      }

      .selector input {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 0.95rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      thead th {
        border: 1px solid var(--line);
        background: #eff4fa;
        padding: 10px 8px;
        text-align: left;
        font-size: 0.92rem;
      }

      thead th.week-head {
        width: 56px;
        text-align: center;
      }

      tbody td {
        border: 1px solid var(--line);
        vertical-align: top;
        padding: 8px;
        height: 102px;
      }

      tbody td.week-cell {
        text-align: center;
        vertical-align: middle;
        font-weight: 700;
        color: var(--subtle);
        background: #f6f9fd;
        padding: 0;
      }

      .cell {
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .meta {
        display: flex;
        justify-content: flex-end;
        font-size: 0.85rem;
        color: var(--subtle);
      }

      .name-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 8px;
        font-size: 0.95rem;
      }

      .fixed-name {
        margin-top: auto;
        font-weight: 700;
        color: var(--accent);
      }

      .empty-day {
        color: #9aa8bc;
        font-style: italic;
        margin-top: auto;
      }

      .status {
        margin-top: 10px;
        min-height: 38px;
        font-size: 0.9rem;
        color: var(--subtle);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #ffffff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .icon-btn:hover {
        border-color: #afbed1;
        background: #f7fbff;
      }

      .icon-btn svg {
        width: 20px;
        height: 20px;
        stroke: #2f3f55;
      }

      @media (max-width: 900px) {
        .page {
          padding: 10px;
        }

        .calendar-wrap {
          padding: 12px;
        }

        .topbar {
          flex-direction: column;
          align-items: stretch;
        }

        .selector {
          align-items: flex-start;
        }

        tbody td {
          height: 90px;
          padding: 6px;
        }

        .name-input {
          font-size: 0.85rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="calendar-wrap">
        <div class="topbar">
          <div>
            <h1 class="title">Calendar Creator</h1>
            <p class="subtitle">Monday is fixed to PDAY. Other cells are persisted by occurrence + day of week.</p>
          </div>
          <div class="selector">
            <label for="monthPicker">Month / Year</label>
            <input id="monthPicker" type="month" />
          </div>
        </div>

        <table>
          <thead>
            <tr id="headerRow"></tr>
          </thead>
          <tbody id="calendarBody"></tbody>
        </table>

        <div id="status" class="status">
          <span id="statusText"></span>
          <button id="downloadBtn" class="icon-btn" type="button" title="Download calendar as PNG" aria-label="Download calendar as PNG">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" xmlns="http://www.w3.org/2000/svg">
              <rect x="3.5" y="5" width="17" height="14" rx="2.5"></rect>
              <circle cx="9" cy="10" r="1.5"></circle>
              <path d="M6.5 16l4-4 2.2 2.2 2.7-2.7 2.1 2.5"></path>
            </svg>
          </button>
        </div>
      </main>
    </div>

    <script>
      const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
      const headerRow = document.getElementById("headerRow");
      const calendarBody = document.getElementById("calendarBody");
      const monthPicker = document.getElementById("monthPicker");
      const statusEl = document.getElementById("status");
      const statusTextEl = document.getElementById("statusText");
      const downloadBtn = document.getElementById("downloadBtn");

      function showStatus(message, isError = false) {
        statusTextEl.textContent = message;
        statusEl.style.color = isError ? "#b42c2c" : "#6b7a90";
      }

      function setDefaultMonth() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        monthPicker.value = `${year}-${month}`;
      }

      function renderHeader() {
        headerRow.innerHTML = "";
        const weekTh = document.createElement("th");
        weekTh.className = "week-head";
        weekTh.textContent = "Week";
        headerRow.appendChild(weekTh);

        for (const day of DAYS) {
          const th = document.createElement("th");
          th.textContent = day;
          headerRow.appendChild(th);
        }
      }

      async function saveCell(occurrence, dayOfWeek, nameValue) {
        try {
          const response = await fetch("/api/calendar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              occurrence: occurrence,
              day_of_week: dayOfWeek,
              name: nameValue,
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            showStatus(data.error || "Failed to save", true);
            return;
          }

          showStatus(`Saved ${dayOfWeek} (${occurrence}${ordinalSuffix(occurrence)} occurrence) as "${nameValue || ""}"`);
        } catch (error) {
          showStatus("Network error while saving", true);
        }
      }

      function ordinalSuffix(value) {
        if (value % 100 >= 11 && value % 100 <= 13) return "th";
        if (value % 10 === 1) return "st";
        if (value % 10 === 2) return "nd";
        if (value % 10 === 3) return "rd";
        return "th";
      }

      function renderCalendar(weeks) {
        calendarBody.innerHTML = "";

        for (const week of weeks) {
          const row = document.createElement("tr");
          const weekCell = document.createElement("td");
          weekCell.className = "week-cell";
          weekCell.textContent = `W${week.week_number}`;
          row.appendChild(weekCell);

          for (const cellData of week.cells) {
            const cell = document.createElement("td");
            const box = document.createElement("div");
            box.className = "cell";

            const meta = document.createElement("div");
            meta.className = "meta";

            const dayNumber = document.createElement("span");
            dayNumber.textContent = cellData.day_number === null ? "-" : String(cellData.day_number);

            meta.appendChild(dayNumber);
            box.appendChild(meta);

            if (cellData.day_of_week === "Monday") {
              const fixedName = document.createElement("div");
              fixedName.className = "fixed-name";
              fixedName.textContent = "PDAY";
              box.appendChild(fixedName);
            } else if (cellData.day_number === null) {
              const empty = document.createElement("div");
              empty.className = "empty-day";
              empty.textContent = "No date in this month";
              box.appendChild(empty);
            } else {
              const input = document.createElement("input");
              input.className = "name-input";
              input.type = "text";
              input.value = cellData.name || "";
              input.placeholder = "Type a name";
              input.addEventListener("change", () => {
                if (cellData.occurrence) {
                  saveCell(cellData.occurrence, cellData.day_of_week, input.value.trim());
                }
              });
              box.appendChild(input);
            }

            cell.appendChild(box);
            row.appendChild(cell);
          }

          calendarBody.appendChild(row);
        }
      }

      async function fetchCalendar() {
        if (!monthPicker.value) {
          return;
        }

        const [yearStr, monthStr] = monthPicker.value.split("-");
        const year = Number(yearStr);
        const month = Number(monthStr);

        try {
          const response = await fetch(`/api/calendar?year=${year}&month=${month}`);
          const data = await response.json();

          if (!response.ok) {
            showStatus(data.error || "Failed to load calendar", true);
            return;
          }

          renderCalendar(data.weeks);
          showStatus(`Showing ${String(month).padStart(2, "0")}/${year}`);
        } catch (error) {
          showStatus("Network error while loading calendar", true);
        }
      }

      function collectCalendarSnapshot() {
        const weeks = [];
        const rows = Array.from(calendarBody.querySelectorAll("tr"));

        for (const row of rows) {
          const weekCell = row.querySelector(".week-cell");
          const weekLabel = weekCell ? weekCell.textContent.trim() : "";
          const dayCells = Array.from(row.querySelectorAll("td")).slice(1);
          const cells = dayCells.map((cell) => {
            const dayNumberEl = cell.querySelector(".meta span");
            const fixedNameEl = cell.querySelector(".fixed-name");
            const inputEl = cell.querySelector("input");
            const dayNumber = dayNumberEl ? dayNumberEl.textContent.trim() : "-";
            let name = "";
            if (fixedNameEl) {
              name = fixedNameEl.textContent.trim();
            } else if (inputEl) {
              name = inputEl.value.trim();
            }
            return { dayNumber, name };
          });

          weeks.push({ weekLabel, cells });
        }

        return weeks;
      }

      function downloadCalendarImage() {
        const weeks = collectCalendarSnapshot();
        const weekCount = weeks.length || 6;
        const selected = monthPicker.value || "calendar";
        const [y, m] = selected.split("-");
        const title = y && m ? `${m}/${y}` : "Calendar";
        const dateStamp = new Date().toISOString().slice(0, 10);

        const weekColW = 78;
        const dayColW = 152;
        const headerH = 44;
        const rowH = 104;
        const pad = 16;
        const width = pad * 2 + weekColW + dayColW * 7;
        const height = pad * 2 + headerH + rowH * weekCount + 34;
        const scale = 2;

        const canvas = document.createElement("canvas");
        canvas.width = width * scale;
        canvas.height = height * scale;
        const ctx = canvas.getContext("2d");
        ctx.scale(scale, scale);

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "#1a2433";
        ctx.font = "bold 18px Segoe UI, Tahoma, sans-serif";
        ctx.fillText(`Calendar ${title}`, pad, pad + 4);

        const gridX = pad;
        const gridY = pad + 16;
        const gridW = weekColW + dayColW * 7;
        const gridH = headerH + rowH * weekCount;

        ctx.fillStyle = "#eff4fa";
        ctx.fillRect(gridX, gridY, gridW, headerH);
        ctx.strokeStyle = "#d4dde8";
        ctx.lineWidth = 1;

        ctx.beginPath();
        for (let i = 0; i <= weekCount; i += 1) {
          const yLine = gridY + headerH + i * rowH;
          ctx.moveTo(gridX, yLine);
          ctx.lineTo(gridX + gridW, yLine);
        }
        for (let i = 0; i <= 8; i += 1) {
          const xLine = i === 0 ? gridX : i === 1 ? gridX + weekColW : gridX + weekColW + (i - 1) * dayColW;
          ctx.moveTo(xLine, gridY);
          ctx.lineTo(xLine, gridY + gridH);
        }
        ctx.stroke();

        ctx.fillStyle = "#44556d";
        ctx.font = "bold 13px Segoe UI, Tahoma, sans-serif";
        ctx.textBaseline = "middle";
        ctx.fillText("Week", gridX + 18, gridY + headerH / 2);
        for (let i = 0; i < DAYS.length; i += 1) {
          const x = gridX + weekColW + i * dayColW + 10;
          ctx.fillText(DAYS[i], x, gridY + headerH / 2);
        }

        for (let w = 0; w < weeks.length; w += 1) {
          const rowTop = gridY + headerH + w * rowH;
          const rowMid = rowTop + rowH / 2;
          ctx.fillStyle = "#6b7a90";
          ctx.font = "bold 13px Segoe UI, Tahoma, sans-serif";
          ctx.fillText(weeks[w].weekLabel || `W${w + 1}`, gridX + 24, rowMid);

          for (let d = 0; d < DAYS.length; d += 1) {
            const cell = weeks[w].cells[d] || { dayNumber: "-", name: "" };
            const left = gridX + weekColW + d * dayColW;

            ctx.fillStyle = "#6b7a90";
            ctx.font = "12px Segoe UI, Tahoma, sans-serif";
            ctx.textAlign = "right";
            ctx.fillText(cell.dayNumber, left + dayColW - 10, rowTop + 14);

            ctx.textAlign = "left";
            ctx.fillStyle = cell.name === "PDAY" ? "#0f7b6c" : "#1a2433";
            ctx.font = cell.name === "PDAY" ? "bold 13px Segoe UI, Tahoma, sans-serif" : "13px Segoe UI, Tahoma, sans-serif";
            ctx.fillText(cell.name || "", left + 10, rowTop + 58);
          }
        }

        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download = `calendar-${dateStamp}.png`;
        link.click();
        showStatus(`Downloaded calendar-${dateStamp}.png`);
      }

      monthPicker.addEventListener("change", fetchCalendar);
      downloadBtn.addEventListener("click", downloadCalendarImage);

      renderHeader();
      setDefaultMonth();
      fetchCalendar();
    </script>
  </body>
</html>
